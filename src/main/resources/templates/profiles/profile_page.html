<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main_layout :: layout(~{::title}, ~{::main})}">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" href="/main.css"/>
</head>

<body>
<main>

    <div id="user-info-container"
         style="display: flex; padding: 12px; margin-bottom: 12px; gap:12px; border: 1px solid black">

        <div class="profile-picture-div">
            <img class="profile-picture"
                 th:alt="${user.getProfilePictureUrl()}"
                 th:src="${user.getProfilePictureUrl()}"/>
        </div>

        <div id="user-info-text" style="flex: 1;">
            <div id="user-full-name-text" style="display: flex; gap: 6px;">
                <h1 th:text="${user.firstName}"></h1>
                <h1 th:text="${user.lastName}"></h1>
            </div>
            <h4 id="username-text" th:text="'username: ' + ${user.username}"></h4>
            <p id="user-id-text" th:text="'userID: ' + ${user.id}"></p>
        </div>

        <!-- Only show action buttons when viewing someone else's profile -->
        <div th:if="${friendshipStatus != null}"
             id="friend-actions-container" style="display:flex; flex-direction: column; gap: 12px">

            <!-- NONE: no relationship yet -->
            <th:block th:if="${friendshipStatus == 'NONE'}">
                <form th:action="@{/friends/request/{u}(u=${user.username})}" method="post">
                    <button type="submit" class="btn-primary">
                        Add Friend <i class="fa-solid fa-plus"></i>
                    </button>
                </form>
                <form th:action="@{/friends/block/{u}(u=${user.username})}" method="post">
                    <button type="submit" class="btn-danger">
                        Block <i class="fa-solid fa-ban" style="color: darkred"></i>
                    </button>
                </form>
            </th:block>

            <!-- PENDING + I sent it -->
            <th:block th:if="${friendshipStatus == 'PENDING' and friendshipDirection == 'I_SENT'}">
                <p style="color: grey; font-style: italic;">Friend request sent</p>
                <form th:action="@{/friends/unfriend/{u}(u=${user.username})}" method="post">
                    <button type="submit" class="btn-secondary">Cancel Request</button>
                </form>
            </th:block>

            <!-- PENDING + they sent it -->
            <th:block th:if="${friendshipStatus == 'PENDING' and friendshipDirection == 'THEY_SENT'}">
                <form th:action="@{/friends/accept/{u}(u=${user.username})}" method="post">
                    <button type="submit" class="btn-primary">
                        Accept Request <i class="fa-solid fa-check"></i>
                    </button>
                </form>
                <form th:action="@{/friends/decline/{u}(u=${user.username})}" method="post">
                    <button type="submit" class="btn-secondary">
                        Decline <i class="fa-solid fa-xmark"></i>
                    </button>
                </form>
            </th:block>

            <!-- ACCEPTED -->
            <th:block th:if="${friendshipStatus == 'ACCEPTED'}">
                <p style="color: green;">&#10003; Friends</p>
                <form th:action="@{/friends/unfriend/{u}(u=${user.username})}" method="post">
                    <button type="submit" class="btn-secondary">Unfriend</button>
                </form>
                <form th:action="@{/friends/block/{u}(u=${user.username})}" method="post">
                    <button type="submit" class="btn-danger">
                        Block <i class="fa-solid fa-ban" style="color: darkred"></i>
                    </button>
                </form>
            </th:block>

            <!-- BLOCKED by current user -->
            <th:block th:if="${friendshipStatus == 'BLOCKED' and friendshipDirection == 'I_SENT'}">
                <p style="color: grey;">User blocked</p>
                <form th:action="@{/friends/unfriend/{u}(u=${user.username})}" method="post">
                    <button type="submit" class="btn-danger">
                        Unblock <i class="fa-solid fa-eye" style="color: green"></i>
                    </button>
                </form>
            </th:block>

            <!-- BLOCKED by them: show nothing -->
            <th:block th:if="${friendshipStatus == 'BLOCKED' and friendshipDirection == 'THEY_SENT'}">
            </th:block>

        </div>

    </div>

    <div id="page-container" style="display: flex; gap: 12px;">

        <div id="left-page-section" style="flex:1; padding:12px; border: 1px solid black;">

            <div id="friends-container" style="margin: 6px;">
                <h3 id="friends-header">
                    MY FRIENDS: <a href="/friends" style="font-size: 0.7em; font-weight: normal;">See all</a>
                </h3>
                <p th:if="${#lists.isEmpty(friends)}">You have no friends yet.</p>
                <div id="friends-list" style="display: flex">
                    <div class="profile-friend-card" th:each="friend: ${friends}">
                        <img class="image-thumbnail-lg"
                             alt="profile picture"
                             th:src="${friend.getProfilePictureUrl()}"/>
                        <a th:href="@{/profile/{username}(username=${friend.username})}"
                           th:text="${friend.username}"></a>
                    </div>
                </div>
            </div>

            <div id="photos-container" style="margin: 6px;">
                <h3>MY PHOTOS:</h3>
                <img style="width: 50px; height: 50px; margin: 6px;"
                     src="https://s.yimg.com/ny/api/res/1.2/RSWsPdqcgZ4uhM_6ELpzMA--/YXBwaWQ9aGlnaGxhbmRlcjt3PTEyMDA7aD03OTg7Y2Y9d2VicA--/https://media.zenfs.com/en/travel.travelleisure.com/fb8d168ea18a4fb2d4eaa6a55dad64eb">
            </div>

        </div>

        <div id="right-page-section" style="flex:2; padding:12px; border: 1px solid black;">
            <h3>MY POSTS:</h3>
            <div th:each="post: ${user.getPosts()}">
                <div th:replace="fragments/post :: post">...</div>
            </div>
        </div>

    </div>

</main>
</body>
</html>
