<header th:fragment="header">

  <div>
  </div>

  <div class="header-searchbar-container">
    <form th:action="@{/search}" method="get" style="display: flex">
      <input id="posts-searchbar" type="text" name="keyword" placeholder="search posts..." />
    </form>
  </div>


  <div th:if="${#authentication != null}">
    <span th:text="${#authentication.principal.attributes['email']}"></span>
  </div>

</header>
