<!DOCTYPE html>
<html>
<head>
    ...
</head>
<body>

<div th:id="'post-container-id-' + ${post.id}" class="post-container" th:fragment="post">

    <div id="user-info" class="post-user-info-container">
        <!-- REPLACE WITH URL FROM DB -->
        <img
                class="image-thumbnail"
                alt="profile-thumbnail"
                th:src="${post.user.getProfilePictureUrl()}">

        <a th:href="@{/profile/{username}(username=${post.user.username})}"><h4 th:text="${post.user.username}"></h4></a>
    </div>

    <div class="post-content-container">
        <p class="post-content-text" th:text="${post.content}"/>
        <div class="post-img-parent">
            <img th:if="${post.imageUrl != null}"
                 th:src="${post.imageUrl}"
                 alt="Post image"
                 class="post-img"/>
        </div>
        <div class="post-footer">
            <small th:text="${#temporals.format(post.createdAt, 'dd MMM yyyy HH:mm')}"></small>
            <div class="post-likes-container">
                <img th:src="@{/images/heart.png}" alt="like" width="16" height="16">
                <small th:text="${likeCounts[post.id]} + ' likes'"></small>
            </div>
        </div>
    </div>


    <div class="add-comment-container">
        <div class="comment-text-profile-div">
            <a th:href="@{/profile/{username}(username=${post.user.username})}">
            <img
                    class="image-thumbnail-comment"
                    alt="profile-thumbnail"
                    th:src="${user.getProfilePictureUrl()}">
            </a>

            <form th:action="@{/comments/new}" method="post" class="comment-form-wrapper">
                <input type="hidden" name="postId" th:value="${post.id}" />
                <textarea class="comment-text-area" placeholder="Write a comment" name="body" rows="2" oninput='this.style.height = "";this.style.height = this.scrollHeight + 2 + "px"'></textarea>
                <input type="submit" value="Submit" class="comment-submit-btn"/>
            </form>
        </div>
    </div>

    <hr class="comment-line">

    <div class="comment" th:each="comment: ${post.getComments()}">
        <a th:href="@{/profile/{username}(username=${post.user.username})}">
        <img
            class="image-thumbnail-comment"
            alt="profile-thumbnail"
            th:src="${comment.user.getProfilePictureUrl()}">
        </a>

        <div class="comment-content">
            <a th:href="@{/profile/{username}(username=${post.user.username})}">
                <p class="comment-username" th:text="${comment.getUser().getUsername()}"></p>
            </a>
            <p class="comment-p" th:text="${comment.body}"></p>
            <small class="comment-timestamp" th:text="${#temporals.format(comment.commentedOn, 'dd MMM yyyy HH:mm')}"></small>
        </div>
    </div>

</div>

</body>
</html>
