<!DOCTYPE html>
    <html xmlns:th="http://www.thymeleaf.org"
          xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5" >
    <head lang="en">
        <meta charset="UTF-8"/>
        <title>Acebook</title>
        <link rel="stylesheet" href="/main.css" />
    </head>
    <body>

    <h1>Posts</h1>

    <div sec:authorize="isAuthenticated()" id="greeting">
        Signed in as <span sec:authentication="principal.attributes['email']"></span>
    </div>

    <form action="#" th:action="@{/posts}" th:object="${post}" method="post">
        <p>Content: <input type="text" th:field="*{content}" /></p>
        <p><input type="submit" value="Submit" /> <input type="reset" value="Reset" /></p>
    </form>

    <ul th:each="post: ${posts}">
        <li>
            <span th:text="${post.content}"></span>
            <img th:src="@{/images/heart.png}" alt="Icon" width="24" height="24">
            <small th:text="${likeCounts[post.id]}"></small>
        </li>
<!-- If we want to display time   <small th:text="${#temporals.format(post.createdAt, 'dd MMM yyyy HH:mm')}"></small>-->
    </ul>

    </body>
</html>
